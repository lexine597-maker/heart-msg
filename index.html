<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Heart Glow</title>

<style>
html, body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:black;
    font-family: Arial, sans-serif;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

const heartParticles = [];
const floatParticles = [];

// slightly less crowded
const HEART_COUNT = 100;
const FLOAT_COUNT = 90;

// HEART FORMULA
function heart(t){
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t)
           - 5 * Math.cos(2*t)
           - 2 * Math.cos(3*t)
           - Math.cos(4*t))
    };
}

// CREATE HEART TEXT PARTICLES
for(let i = 0; i < HEART_COUNT; i++){
    const t = (i / HEART_COUNT) * Math.PI * 2;
    heartParticles.push({
        t: t,
        offset: Math.random() * Math.PI * 2
    });
}

// FLOATING PARTICLES
for(let i = 0; i < FLOAT_COUNT; i++){
    floatParticles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        size: Math.random() * 1.6,
        speed: Math.random() * 0.4 + 0.15
    });
}

// BACKGROUND TRAIL
function drawBG(){
    ctx.fillStyle = "rgba(0,0,0,0.20)";
    ctx.fillRect(0, 0, w, h);
}

function animate(time){
    drawBG();
    
const beat = Math.sin(time * 0.0035) * 0.45 +
             Math.sin(time * 0.009) * 0.25;

    const scale = 16 + beat * 5;

    // FLOATING PARTICLES
    floatParticles.forEach(p => {
        p.y -= p.speed;
        if(p.y < 0){
            p.y = h;
            p.x = Math.random() * w;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

        ctx.fillStyle = "rgba(255,80,120,0.35)";
        ctx.shadowBlur = 4;
        ctx.shadowColor = "rgba(255,100,140,0.3)";
        ctx.fill();
    });

    // HEART TEXT
    heartParticles.forEach((p, i) => {
        const pos = heart(p.t);

        const x = w/2 + pos.x * scale;
        const y = h/2 + pos.y * scale;

        // softer glow
        const glow = 5 + Math.sin(time * 0.008 + p.offset) * 2;

        ctx.shadowBlur = glow;
        ctx.shadowColor = "rgba(255,70,90,0.45)";

        const r = 255;
        const g = 60 + Math.sin(time * 0.008 + i) * 18;
        const b = 110 + Math.cos(time * 0.008 + i) * 18;

        ctx.fillStyle = `rgb(${r},${g},${b})`;

        ctx.font = "15px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.fillText("I love you, pre-tea", x, y);
    });

    requestAnimationFrame(animate);
}

ctx.fillStyle = "black";
ctx.fillRect(0, 0, w, h);

animate(0);

// RESIZE
window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
});
</script>

</body>
</html>
